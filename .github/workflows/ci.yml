name: CI

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build Test Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and save image
        uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=docker,dest=/tmp/image.tar
          tags: opencode-openchamber:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-image
          path: /tmp/image.tar
          retention-days: 1

  scan-test:
    name: Scan Test Image
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: test-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@v7
        with:
          image: "opencode-openchamber:test"
          output-format: sarif
          output-file: grype-results.sarif
          severity-cutoff: high
          fail-build: false

      - name: Upload Grype results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: grype-results.sarif
          category: sca-grype-test

  test-services:
    name: Integration Tests
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: test-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Start services
        run: |
          sed -i '/build:/,/dockerfile: Dockerfile/c\    image: opencode-openchamber:test' docker-compose.dev.yml
          sed -i 's/container_name: ai-dev/container_name: ci-test/' docker-compose.dev.yml
          docker compose -f docker-compose.dev.yml up -d
          echo "Waiting for services..."
          sleep 30

      - name: Run tests
        run: |
          chmod +x test/run-tests.sh
          ./test/run-tests.sh ci-test

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.dev.yml logs ci-test || true
          docker compose -f docker-compose.dev.yml ps || true

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v --remove-orphans || true

  build-publish:
    name: Build Publish Image
    needs: [scan-test, test-services]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and save image
        uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=docker,dest=/tmp/image.tar
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-image
          path: /tmp/image.tar
          retention-days: 1

  scan-publish:
    name: Scan Publish Image
    needs: build-publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@v7
        with:
          image: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          output-format: sarif
          output-file: grype-results.sarif
          severity-cutoff: critical
          fail-build: true

      - name: Upload Grype results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: grype-results.sarif
          category: sca-grype-publish

  publish:
    name: Publish to GHCR
    needs: scan-publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-image
          path: /tmp

      - name: Load and push image
        run: |
          docker load -i /tmp/image.tar
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  release:
    name: Create Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Release Body
        id: body
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "${{ github.ref_name }}" | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges)
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          fi
          {
            echo 'body<<RELEASE_BODY_EOF'
            echo '## Docker Image'
            echo ''
            echo '```bash'
            echo 'docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}'
            echo '```'
            echo ''
            echo '## Quick Start'
            echo ''
            echo '```bash'
            echo 'cp .env.example .env'
            echo 'docker compose up -d'
            echo '```'
            echo ''
            echo '## Changes'
            echo ''
            echo "$CHANGELOG"
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.body.outputs.body }}
