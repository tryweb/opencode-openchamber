name: CI

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-push:
    name: Build and Push to GHCR
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha
            latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=docker,dest=/tmp/image.tar
          tags: opencode-openchamber:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Start services
        run: |
          sed -i '/build:/,/dockerfile: Dockerfile/c\    image: opencode-openchamber:test' docker-compose.dev.yml
          sed -i 's/container_name: ai-dev/container_name: ci-test/' docker-compose.dev.yml
          docker compose -f docker-compose.dev.yml up -d
          echo "Waiting for services..."
          sleep 30

      - name: Run tests
        run: |
          chmod +x test/run-tests.sh
          ./test/run-tests.sh ci-test

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.dev.yml logs ci-test || true
          docker compose -f docker-compose.dev.yml ps || true

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v --remove-orphans || true

  scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=docker,dest=/tmp/image.tar
          tags: opencode-openchamber:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@v7
        with:
          image: "opencode-openchamber:scan"
          output-format: sarif
          output-file: grype-results.sarif
          severity-cutoff: critical
          fail-build: false

      - name: Upload Grype results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: grype-results.sarif
          category: sca-grype

  release:
    name: Create Release
    needs: [build-push, test, scan]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Body
        id: body
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          
          PREV_TAG=$(git tag --sort=-version:refname | \
            grep -vE '(rc|beta|alpha|dev|test|pre)' | \
            grep -v "^${CURRENT_TAG}$" | \
            head -1 || true)
          
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges | head -50)
            SINCE_TAG="first release"
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges | head -50)
            SINCE_TAG="${PREV_TAG}"
          fi
          
          {
            echo 'body<<RELEASE_BODY_EOF'
            echo '## Docker Image'
            echo ''
            echo '```bash'
            echo 'docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}'
            echo '```'
            echo ''
            echo '## Quick Start'
            echo ''
            echo '```bash'
            echo 'cp .env.example .env'
            echo 'docker compose up -d'
            echo '```'
            echo ''
            echo '## Changes (since '"${SINCE_TAG}"')'
            echo ''
            echo "$CHANGELOG"
            echo ''
            echo '## Test Results'
            echo ''
            echo '| Job | Status |'
            echo '|-----|--------|'
            TEST_STATUS="${{ join(steps.*.conclusion, ' ') }}"
            if echo "$TEST_STATUS" | grep -q "failure"; then
              echo '| Integration Tests | ❌ Failed |'
            else
              echo '| Integration Tests | ✅ Passed |'
            fi
            echo '| Vulnerability Scan | ⚠️ Report Available |'
            echo ''
            echo '---'
            echo '*Generated by GitHub Actions*'
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.body.outputs.body }}